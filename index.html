<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Café Arruda Gourmet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header / Navbar -->
    <header>
        <nav class="navbar section-content">
            <a href="#" class="nav-logo">
                <h2 class="logo-text">☕ Café</h2>
            </a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="#" class="nav-link">Página Inicial</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Sobre</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Menu</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Depoimentos</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Galeria</a>
                </li>
                <li class="nav-item">
                    <a href="#" class="nav-link">Contato</a>
                </li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Hero section -->
        <section class="hero-section">
            <div class="section-content">
                <div class="hero-details">
                    <h2 class="title">O Melhor Café</h2>
                    <h3 class="subtitle">Faça do seu dia um dia incrível com o nosso café especial!</h3>
                    <p class="description">Bem-vindo ao nosso paraíso do café, onde cada grão conta uma história e cada xícara desperta alegria.</p>

                    <div class="buttons">
                        <a href="#" class="button order-now">Encomende Agora</a>
                        <a href="#" class="button contact-us">Contate-nos</a>
                        
                    </div>
                </div>
                <div class="hero-image-wrapper">
                    <img src="img/coffee-hero-section.png" alt="Hero" class="hero-image">
                </div>
            </div>
        </section>
    </main>
</body>
</html>
